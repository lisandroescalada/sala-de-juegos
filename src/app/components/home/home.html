<div class="container my-5">
    <div class="text-center text-white mb-5">
        <h1 class="display-3 fw-bold mb-3">Bienvenido a la Sala de Juegos</h1>
        <p class="lead">Pon a prueba tus habilidades cognitivas y motrices</p>
    </div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="game-card" [routerLink]="['/ahorcado']">
                <div class="game-icon">📝</div>
                <h5>Ahorcado</h5>
                <p class="text-muted">Adivina la palabra</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="game-card" [routerLink]="['/mayor-menor']">
                <div class="game-icon">🃏</div>
                <h5>Mayor o Menor</h5>
                <p class="text-muted">Adivina la carta</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="game-card" [routerLink]="['/preguntados']">
                <div class="game-icon">❓</div>
                <h5>Preguntados</h5>
                <p class="text-muted">Trivia de conocimiento</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="game-card" [routerLink]="['/simon-dice']">
                <div class="game-icon">🎨</div>
                <h5>Simón Dice</h5>
                <p class="text-muted">Memoria y reflejos</p>
            </div>
        </div>
    </div>
</div>
