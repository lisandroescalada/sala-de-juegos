<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Iniciar Sesión</h2>
                    <form [formGroup]="loginForm" (ngSubmit)="signIn()">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input id="loginEmail" class="form-control" type="email" formControlName="email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input id="loginPassword" class="form-control" type="password" formControlName="password">
                        </div>
                        <button type="submit" class="btn-game w-100 mb-3">Iniciar Sesión</button>
                    </form>

                    <hr>

                    <p class="text-center text-muted mb-3">Acceso rápido:</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-primary" (click)="signIn('admin@demo.com', 'Admin123!')">
                            Admin
                        </button>
                        <button class="btn btn-outline-success" (click)="signIn('user@demo.com', 'User123!')">
                            Usuario
                        </button>
                        <button class="btn btn-outline-secondary" (click)="signIn('guest@demo.com', 'Guest123!')">
                            Invitado
                        </button>
                    </div>
                    <p class="text-center mt-3">
                        ¿No tienes cuenta? <a href="#" [routerLink]="['/register']">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
